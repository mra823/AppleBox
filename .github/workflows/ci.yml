name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-linux:
    strategy:
      matrix:
        compiler: [gcc, clang]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libsdl2-dev libgl1-mesa-dev \
            $([ "${{ matrix.compiler }}" = clang ] && echo clang)
      - name: Configure
        env:
          CC: ${{ matrix.compiler == 'clang' && 'clang' || 'gcc' }}
          CXX: ${{ matrix.compiler == 'clang' && 'clang++' || 'g++' }}
        run: cmake --preset debug
      - name: Build
        run: cmake --build --preset debug
      - name: Cache CPU test data
        uses: actions/cache@v4
        with:
          path: tests/data
          key: cpu-test-data-6502-v1
      - name: Fetch CPU test data
        run: ./scripts/fetch_test_data.sh
      - name: Test
        run: ctest --preset debug
